services:
  db:
    environment:
      POSTGRES_PASSWORD: null
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGBACKREST_REPO1_S3_KEY: null
      PGBACKREST_REPO1_S3_KEY_FILE: /run/secrets/pgbackrest_s3_key
      PGBACKREST_REPO1_S3_KEY_SECRET: null
      PGBACKREST_REPO1_S3_KEY_SECRET_FILE: /run/secrets/pgbackrest_s3_key_secret
      PGBACKREST_REPO1_CIPHER_PASS: null
      PGBACKREST_REPO1_CIPHER_PASS_FILE: /run/secrets/pgbackrest_cipher_pass
    secrets:
      [
        postgres_password,
        pgbackrest_s3_key,
        pgbackrest_s3_key_secret,
        pgbackrest_cipher_pass,
      ]
  migrate:
    environment:
      DATABASE_URL: null
      DATABASE_URL_FILE: /run/secrets/database_url
      TOKEN_PEPPER: null
      TOKEN_PEPPER_FILE: /run/secrets/token_pepper
      ADMIN_CLI_SECRET: null
      ADMIN_CLI_SECRET_FILE: /run/secrets/admin_cli_secret
    secrets: [database_url, token_pepper, admin_cli_secret]
  web:
    environment:
      DATABASE_URL: null
      DATABASE_URL_FILE: /run/secrets/database_url
      TOKEN_PEPPER: null
      TOKEN_PEPPER_FILE: /run/secrets/token_pepper
      METRICS_BEARER_TOKEN: null
      METRICS_BEARER_TOKEN_FILE: /run/secrets/metrics_token
      ADMIN_CLI_SECRET: null
      ADMIN_CLI_SECRET_FILE: /run/secrets/admin_cli_secret
      PROXY_SHARED_SECRET: null
      PROXY_SHARED_SECRET_FILE: /run/secrets/proxy_shared_secret
    secrets:
      [
        database_url,
        token_pepper,
        metrics_token,
        admin_cli_secret,
        proxy_shared_secret,
      ]
  seed:
    environment:
      DATABASE_URL: null
      DATABASE_URL_FILE: /run/secrets/database_url
      TOKEN_PEPPER: null
      TOKEN_PEPPER_FILE: /run/secrets/token_pepper
    secrets: [database_url, token_pepper]
  maintenance:
    environment:
      DATABASE_URL: null
      DATABASE_URL_FILE: /run/secrets/database_url
      TOKEN_PEPPER: null
      TOKEN_PEPPER_FILE: /run/secrets/token_pepper
      ADMIN_CLI_SECRET: null
      ADMIN_CLI_SECRET_FILE: /run/secrets/admin_cli_secret
    secrets: [database_url, token_pepper, admin_cli_secret]
  caddy:
    environment:
      PROXY_SHARED_SECRET: null
      PROXY_SHARED_SECRET_FILE: /run/secrets/proxy_shared_secret
    secrets: [proxy_shared_secret]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - export PROXY_SHARED_SECRET="$$(cat /run/secrets/proxy_shared_secret)"; exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

secrets:
  postgres_password:
    file: ./ops/secrets/postgres_password
  database_url:
    file: ./ops/secrets/database_url
  token_pepper:
    file: ./ops/secrets/token_pepper
  metrics_token:
    file: ./ops/secrets/metrics_token
  admin_cli_secret:
    file: ./ops/secrets/admin_cli_secret
  proxy_shared_secret:
    file: ./ops/secrets/proxy_shared_secret
  pgbackrest_s3_key:
    file: ./ops/secrets/pgbackrest_s3_key
  pgbackrest_s3_key_secret:
    file: ./ops/secrets/pgbackrest_s3_key_secret
  pgbackrest_cipher_pass:
    file: ./ops/secrets/pgbackrest_cipher_pass
