version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly }
    groups:
      production-dependencies:
        dependency-type: production
  - package-ecosystem: docker
    directory: /
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /ops/postgres
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
